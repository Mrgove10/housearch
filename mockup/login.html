<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Housearch — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="padding-bottom:0">
  <main style="max-width:380px;margin-top:18vh">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:48px">🏠</div>
      <h1 style="margin:8px 0 4px">Housearch</h1>
      <p style="color:var(--muted);margin:0">Sign in to continue</p>
    </div>
    <form class="card" onsubmit="event.preventDefault(); location='list.html'">
      <label for="pwd">Password</label>
      <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••">
      <button class="btn block" style="margin-top:16px">Sign in</button>
    </form>
  </main>
</body>
</html>
