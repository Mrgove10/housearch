<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Housearch — Map</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .map-wrap { position: relative; }
    .pin {
      position: absolute; transform: translate(-50%, -100%);
      background: var(--accent); color: #fff; font-weight: 700; font-size: 13px;
      padding: 6px 10px; border-radius: 999px; box-shadow: var(--shadow); cursor: pointer;
    }
    .pin.good { background: var(--good); }
    .pin.bad  { background: var(--bad); }
    .pin::after { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); width:0;height:0; border:6px solid transparent; border-top-color:inherit; }
    .drawer {
      position: absolute; left: 12px; right: 12px; bottom: 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 12px;
      display: grid; grid-template-columns: 70px 1fr auto; gap: 12px; align-items: center;
    }
    .drawer .thumb { width:70px;height:70px;border-radius:10px;background:var(--surface-2) center/cover no-repeat;}
  </style>
</head>
<body>
  <header class="appbar">
    <h1>Map</h1>
    <button class="icon-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-5-5"/></svg></button>
  </header>

  <div class="map-wrap">
    <div class="map-canvas"></div>
    <div class="pin good" style="left:32%;top:38%">+8</div>
    <div class="pin" style="left:55%;top:28%">+3</div>
    <div class="pin bad" style="left:48%;top:62%">−4</div>
    <div class="pin good" style="left:70%;top:50%">+12</div>
    <div class="pin" style="left:40%;top:78%">+1</div>

    <a href="house.html" style="color:inherit;text-decoration:none">
      <div class="drawer">
        <div class="thumb" style="background-image:url('https://picsum.photos/seed/h1/200')"></div>
        <div>
          <div style="font-weight:600">Charming stone house 4P</div>
          <div style="font-size:13px;color:var(--muted)">120 m² · Nantes 44000</div>
        </div>
        <div class="score good">+8</div>
      </div>
    </a>
  </div>

  <nav class="nav">
    <a href="list.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>List</a>
    <a href="map.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/><path d="M9 3v15M15 6v15"/></svg>Map</a>
    <a href="add.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>Add</a>
    <a href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a>
  </nav>
</body>
</html>
